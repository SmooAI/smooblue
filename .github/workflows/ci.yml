name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_call:
    # workflow_dispatch is the escape hatch for the changesets
    # auto-release flow — changesets/action's GITHUB_TOKEN-authored
    # PR doesn't trip ci.yml's pull_request: trigger (GitHub's
    # anti-loop guard suppresses workflow chains from GITHUB_TOKEN),
    # so changesets.yml `gh workflow run`s us against the PR ref to
    # land the required status checks on the PR head. See
    # changesets.yml's "Dispatch CI for Release PR" step.
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1

jobs:
    test:
        name: cargo test (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2

            # Dioxus desktop needs WebKit on Linux for its webview backend.
            - name: Install Linux deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libsoup-3.0-dev \
                      libjavascriptcoregtk-4.1-dev \
                      libxdo-dev

            - name: cargo fmt
              run: cargo fmt --all -- --check

            - name: cargo clippy
              run: cargo clippy --workspace --tests -- -D warnings

            - name: cargo test
              run: cargo test --workspace --no-fail-fast

    # Real Bluesky integration tests — runs nightly, not on every PR, so
    # api.bsky.app rate-limits don't gate development.
    real-bluesky:
        name: Real Bluesky API tests
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
            - name: Install Linux deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
                      libjavascriptcoregtk-4.1-dev libxdo-dev
            - name: Run real-Bluesky tests
              run: cargo test --workspace -- --ignored --test-threads=1
