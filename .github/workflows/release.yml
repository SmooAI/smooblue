name: Release

# Tag-driven, NOT commit-message-driven.
#
# Versioning happens locally via the changesets flow (`pnpm changeset`
# during development, then `pnpm version` + `pnpm release` to cut).
# This workflow only fires when a vX.Y.Z tag is pushed: it builds the
# macOS .app bundle and uploads it as an asset on the GitHub release
# that the tag created.
#
# See .changeset/README.md for the full release playbook.

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    bundle:
        name: Build + attach macOS .app
        runs-on: macos-latest
        if: github.repository == 'SmooAI/smooblue'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2

            # Build via the same script we use locally.
            - name: Build macOS .app bundle
              run: ./scripts/bundle-macos.sh

            # Use ditto so resource forks + symlinks survive the zip round-trip.
            - name: Zip .app
              run: |
                  cd dist
                  ditto -c -k --sequesterRsrc --keepParent Smooblue.app Smooblue-macos-arm64.zip

            # Pull the changelog entry for this tag out of CHANGELOG.md
            # and use it as the GitHub release body. Falls back to a
            # placeholder if the section isn't found.
            - name: Extract changelog for this release
              id: changelog
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  awk -v ver="$TAG" '
                      $0 ~ "^## " ver { found=1; next }
                      found && /^## [0-9]+\./ { exit }
                      found { print }
                  ' CHANGELOG.md > /tmp/release-notes.md
                  if [[ ! -s /tmp/release-notes.md ]]; then
                      echo "Release $GITHUB_REF_NAME — see CHANGELOG.md for details." > /tmp/release-notes.md
                  fi
                  echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

            - name: Create / update GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
                      gh release edit "$GITHUB_REF_NAME" \
                          --notes-file "${{ steps.changelog.outputs.notes_file }}"
                  else
                      gh release create "$GITHUB_REF_NAME" \
                          --title "$GITHUB_REF_NAME" \
                          --notes-file "${{ steps.changelog.outputs.notes_file }}"
                  fi
                  gh release upload "$GITHUB_REF_NAME" \
                      dist/Smooblue-macos-arm64.zip --clobber
