name: Release

# Tag-driven, NOT commit-message-driven.
#
# Versioning happens locally via the changesets flow (`pnpm changeset`
# during development, then `pnpm version` + `pnpm release` to cut).
# This workflow only fires when a vX.Y.Z tag is pushed: it builds
# release binaries (macOS .app + Linux tarball) and uploads them as
# assets on the GitHub release that the tag created.
#
# See .changeset/README.md for the full release playbook.

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    # Build the macOS .app bundle on macos-latest (arm64 runner).
    bundle-macos:
        name: Build + attach macOS .app
        runs-on: macos-latest
        if: github.repository == 'SmooAI/smooblue'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2

            - name: Build macOS .app bundle
              run: ./scripts/bundle-macos.sh

            # ditto so resource forks + symlinks survive the zip round-trip.
            - name: Zip .app
              run: |
                  cd dist
                  ditto -c -k --sequesterRsrc --keepParent Smooblue.app Smooblue-macos-arm64.zip

            # Wrap the per-version CHANGELOG section with install /
            # upgrade / downloads sections so the release page itself
            # is a self-serve install guide. Same script can be run
            # locally to retroactively re-render an existing release.
            - name: Build release notes
              id: changelog
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  ./scripts/build-release-notes.sh "$VERSION" CHANGELOG.md > /tmp/release-notes.md
                  echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

            - name: Create / update GitHub release + upload .app
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
                      gh release edit "$GITHUB_REF_NAME" \
                          --notes-file "${{ steps.changelog.outputs.notes_file }}"
                  else
                      gh release create "$GITHUB_REF_NAME" \
                          --title "$GITHUB_REF_NAME" \
                          --notes-file "${{ steps.changelog.outputs.notes_file }}"
                  fi
                  gh release upload "$GITHUB_REF_NAME" \
                      dist/Smooblue-macos-arm64.zip --clobber

    # Build the Linux x86_64 binary on ubuntu-latest. Webkit-gtk +
    # friends are runtime deps the end-user installs (the binary
    # dynamically links against them); the build-time deps installed
    # below are just to compile.
    bundle-linux:
        name: Build + attach Linux x86_64 tarball
        runs-on: ubuntu-latest
        if: github.repository == 'SmooAI/smooblue'
        # macOS job creates the release before this one runs. If the
        # macOS build fails we still want the Linux asset attached
        # to whatever release does land.
        needs: [bundle-macos]
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2

            # Build-time prereqs for compiling wry / webkit2gtk
            # bindings. libxdo-dev is needed for the
            # keyboard-simulation crate that dioxus-desktop pulls in
            # on X11 — missing it manifests as `unable to find
            # library -lxdo` at link time. Runtime deps for end
            # users are declared in the .deb metadata + documented
            # in the README + install.sh.
            - name: Install build deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      libssl-dev \
                      libxdo-dev \
                      build-essential

            - name: cargo build --release
              run: cargo build --release -p smooblue-app

            - name: Stage tarball contents
              run: |
                  STAGE="dist/Smooblue-linux-x86_64"
                  mkdir -p "$STAGE"
                  cp target/release/smooblue-app "$STAGE/smooblue"
                  cp assets/icons/icon-256.png "$STAGE/smooblue.png"
                  cat > "$STAGE/README.txt" <<'EOF'
                  Smooblue — Linux x86_64 build

                  Runtime prerequisites (Debian/Ubuntu):
                    sudo apt install libwebkit2gtk-4.1-0 libgtk-3-0 \
                                     libayatana-appindicator3-1 librsvg2-2

                  Run:
                    ./smooblue

                  Or copy the binary somewhere on your PATH:
                    install -m755 smooblue ~/.local/bin/smooblue

                  Or just install the .deb attached to this release —
                  apt will pull in the runtime deps for you:
                    sudo apt install ./Smooblue_*.deb

                  See https://github.com/SmooAI/smooblue for docs.
                  EOF
                  tar -czf dist/Smooblue-linux-x86_64.tar.gz -C dist Smooblue-linux-x86_64

            # cargo-deb wraps the release binary in a .deb that
            # declares webkit2gtk / gtk3 / appindicator / librsvg
            # as proper apt deps, so users get a one-command
            # install (`sudo apt install ./smooblue.deb`) that
            # pulls runtime libs automatically. Metadata lives in
            # crates/smooblue-app/Cargo.toml under
            # [package.metadata.deb].
            - name: Install cargo-deb
              run: cargo install cargo-deb --locked

            - name: Build .deb
              run: |
                  cargo deb -p smooblue-app --no-build --output dist/
                  # Normalise the filename — cargo-deb's default
                  # `smooblue_X.Y.Z-1_amd64.deb` includes a debian
                  # revision suffix we don't use. Rename to match
                  # the rest of our release-asset convention.
                  ORIG=$(ls dist/smooblue_*.deb | head -n1)
                  VERSION="${GITHUB_REF_NAME#v}"
                  RENAMED="dist/Smooblue_${VERSION}_amd64.deb"
                  mv "$ORIG" "$RENAMED"
                  ls -la dist/*.deb

            - name: Upload to GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release upload "$GITHUB_REF_NAME" \
                      dist/Smooblue-linux-x86_64.tar.gz \
                      dist/Smooblue_*.deb \
                      --clobber

    # Bump the SmooAI/homebrew-tools tap to point at this release
    # so `brew upgrade --cask smooblue` always pulls the latest.
    # Runs after both bundle jobs finish so the macOS asset is
    # guaranteed to exist when we sha256 it.
    #
    # Auth: an SSH deploy key on SmooAI/homebrew-tools with
    # write access (the public half is registered there; the
    # private half is stored as HOMEBREW_TAP_DEPLOY_KEY on this
    # repo). Deploy keys are scoped to ONE repo + can only do
    # git operations on it — strictly narrower blast radius
    # than a cross-repo PAT, and there's nothing else of value
    # in the tap repo even if the key leaks.
    #
    # To rotate: ssh-keygen a new ed25519 keypair, register the
    # .pub via `gh repo deploy-key add … --allow-write` on
    # SmooAI/homebrew-tools, push the private half to this repo
    # via `gh secret set HOMEBREW_TAP_DEPLOY_KEY -R SmooAI/smooblue
    # < newkey`, then remove the old deploy-key id with
    # `gh repo deploy-key delete <id>`.
    #
    # Without the secret this job no-ops with a warning rather
    # than failing the release.
    update-homebrew-tap:
        name: Update Homebrew tap
        runs-on: ubuntu-latest
        if: github.repository == 'SmooAI/smooblue'
        needs: [bundle-macos, bundle-linux]
        steps:
            - name: Bump tap to ${{ github.ref_name }}
              env:
                  TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
              run: |
                  if [[ -z "${TAP_DEPLOY_KEY:-}" ]]; then
                      echo "::warning::HOMEBREW_TAP_DEPLOY_KEY not set — skipping tap update. brew users will pick up this release once the secret is configured + a future release is tagged."
                      exit 0
                  fi
                  VERSION="${GITHUB_REF_NAME#v}"
                  ASSET="Smooblue-macos-arm64.zip"
                  URL="https://github.com/SmooAI/smooblue/releases/download/${GITHUB_REF_NAME}/${ASSET}"

                  echo "▸ fetching $ASSET to compute sha256…"
                  curl -fsSL --retry 5 --retry-delay 4 "$URL" -o "/tmp/$ASSET"
                  SHA256=$(sha256sum "/tmp/$ASSET" | cut -d' ' -f1)
                  echo "  sha256 = $SHA256"

                  # Set up SSH with the deploy key. -i picks the key
                  # explicitly so the agent doesn't have to touch
                  # ~/.ssh; -o StrictHostKeyChecking=accept-new is
                  # fine because we're connecting to github.com.
                  echo "▸ setting up deploy key…"
                  mkdir -p ~/.ssh
                  printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_deploy
                  chmod 600 ~/.ssh/tap_deploy
                  ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

                  echo "▸ cloning SmooAI/homebrew-tools…"
                  GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy -o IdentitiesOnly=yes" \
                      git clone git@github.com:SmooAI/homebrew-tools.git /tmp/tap
                  cd /tmp/tap

                  CASK="Casks/smooblue.rb"
                  if [[ ! -f "$CASK" ]]; then
                      echo "::error::$CASK not found in tap repo"
                      exit 1
                  fi

                  # Rewrite only the two volatile lines. Anchored at
                  # the field-name prefix so a sha-shaped string
                  # elsewhere in the file (zap path, livecheck block)
                  # can't accidentally match.
                  sed -i -E \
                      -e "s|^  version \"[^\"]+\"|  version \"${VERSION}\"|" \
                      -e "s|^  sha256 \"[^\"]+\"|  sha256 \"${SHA256}\"|" \
                      "$CASK"

                  if git diff --quiet -- "$CASK"; then
                      echo "▸ tap already at ${VERSION} — nothing to push"
                      exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add "$CASK"
                  # Two -m flags so git stitches them as subject + body
                  # (separated by a blank line). Cleaner in YAML than
                  # a literal multi-line string because we don't have
                  # to fight block-scalar indentation rules.
                  git commit \
                      -m "smooblue ${VERSION}" \
                      -m "Automated bump from SmooAI/smooblue release ${GITHUB_REF_NAME}."
                  GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy -o IdentitiesOnly=yes" \
                      git push origin main
                  echo "✓ tap bumped to ${VERSION}"
