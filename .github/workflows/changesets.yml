name: Changesets

# Auto-release driver.
#
# How this fits with release.yml:
# - release.yml is tag-driven: when a `vX.Y.Z` tag is pushed it
#   builds .app + .deb + tarball and updates the brew tap.
# - changesets.yml is push-to-main driven: it watches for pending
#   `.changeset/*.md` files and manages the version bump via PR.
#
# Flow per release cycle:
#   1. Devs ship features. Each PR drops a .changeset/*.md.
#   2. PRs merge to main. This workflow runs.
#   3. If any pending changesets exist, the action OPENS or UPDATES
#      a "Release" PR that previews the version bumps + CHANGELOG.
#   4. When the maintainer merges that Release PR, this workflow
#      runs again on the new main commit.
#   5. No pending changesets now → the action calls `publish`
#      (scripts/ci-tag-and-push.sh), which tags + pushes vX.Y.Z.
#   6. That tag push wakes release.yml. Builds + uploads + bumps tap.
#
# Why two workflows: tag triggers play nicer with deploy-key auth
# than a single chained workflow, and the separation lets us cut
# manual hotfix releases (just `git tag` + push) without going
# through changesets.

on:
    push:
        branches: [main]
    # NOTE: we used to also have `pull_request_target: types: [closed]`
    # here to fire a separate `publish` job when the Release PR merged.
    # Removed (th-5b49e0): GitHub's anti-loop guard suppresses ALL
    # events from GITHUB_TOKEN-authored actions — including
    # pull_request_target.closed — not just push events. Empirically,
    # 0 pull_request_target runs ever fired after Release PR merges
    # (v1.3.1, v1.3.2, v1.4.0 all required manual tagging). The only
    # exempt triggers are workflow_dispatch + repository_dispatch.
    # Fix: poll for the auto-merge to complete inline, in the same
    # job that enabled it, then tag directly. See "Wait for merge +
    # tag" step below.

permissions:
    contents: write
    pull-requests: write
    # Needed for `gh workflow run` to dispatch ci.yml against the
    # Release PR branch. See the "Dispatch CI" step below for why.
    actions: write

# Only one Release PR in flight at a time. If two pushes to main
# race (a Release PR merge + an unrelated feature merge milliseconds
# apart), the later run waits for the earlier to finish so we don't
# end up with two concurrent Version PRs fighting over the same
# .changeset/*.md set.
concurrency:
    group: changesets-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        name: Open Release PR + auto-merge + tag
        runs-on: ubuntu-latest
        if: github.repository == 'SmooAI/smooblue'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  # Need full history so changesets/action can compute
                  # the right diff for the Release PR.
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install deps
              run: pnpm install --frozen-lockfile

            # `pnpm run version` (which the changesets action invokes
            # to populate the Release PR) calls scripts/sync-cargo-version.mjs,
            # which runs `cargo update --workspace` to rewrite Cargo.lock
            # after the workspace version bump. Need cargo available.
            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Run changesets
              id: changesets
              uses: changesets/action@v1
              with:
                  # When pending changesets exist: open/update the
                  # "Release" PR. Body = the rendered CHANGELOG diff.
                  version: pnpm run version
                  commit: "Release"
                  title: "Release"
                  # When no pending changesets exist (i.e. the Release
                  # PR was just merged): run this to push the vX.Y.Z
                  # tag. Tag push wakes release.yml which builds +
                  # uploads + bumps the brew tap.
                  publish: scripts/ci-tag-and-push.sh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Used by ci-tag-and-push.sh — see that script for
                  # the why-not-just-GITHUB_TOKEN explanation.
                  SMOOBLUE_RELEASE_DEPLOY_KEY: ${{ secrets.SMOOBLUE_RELEASE_DEPLOY_KEY }}

            # Flip the Release PR to auto-merge so the whole pipeline
            # is hands-off: PR opens → required cargo test checks
            # run → checks pass → GitHub squash-merges it → next push
            # to main retriggers this workflow → publish step tags
            # vX.Y.Z → release.yml ships .app + .deb + tarball +
            # bumps the brew tap.
            #
            # --auto waits for the required status checks (the
            # `cargo test (ubuntu-latest)` + `(macos-latest)` jobs in
            # branch protection). --squash matches linear-history
            # rules (rebase merging would be rejected).
            #
            # Skipped on the publish run: `hasChangesets` is false
            # there + pullRequestNumber is empty.
            - name: Auto-merge Release PR
              if: steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.pullRequestNumber != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PR="${{ steps.changesets.outputs.pullRequestNumber }}"
                  echo "▸ enabling auto-merge on Release PR #$PR"
                  gh pr merge "$PR" --squash --auto --repo "$GITHUB_REPOSITORY"

            # Wake CI on the Release PR by pushing an empty commit
            # via the SSH deploy key.
            #
            # Why: changesets/action pushes the branch + opens the
            # PR using GITHUB_TOKEN. GitHub deliberately suppresses
            # workflow triggers for events authored by GITHUB_TOKEN
            # (anti-loop guard) — so ci.yml's pull_request: hook
            # never fires and the required cargo test status checks
            # never report on the PR head. Branch protection then
            # waits forever and auto-merge stalls.
            #
            # workflow_dispatch IS allowed with GITHUB_TOKEN — but
            # the resulting check runs don't get rolled up into the
            # PR's statusCheckRollup that auto-merge consults, so
            # that's a dead end despite reporting in the API.
            #
            # The reliable workaround is to make the branch's HEAD
            # commit one that GitHub considers "user-pushed".
            # Pushing via an SSH deploy key (the SMOOBLUE_RELEASE_DEPLOY_KEY
            # secret, same one used by release.yml's tag-pusher)
            # qualifies — deploy keys are independent credentials,
            # not the bot's token. The empty commit gets squashed
            # away on PR merge so it leaves no trace.
            #
            # Looks up the PR via gh rather than relying on the
            # action's output, because the action only sets
            # pullRequestNumber when it CREATES or UPDATES the PR
            # this run — and a no-op run (e.g., this workflow file
            # was just edited, no new changesets) still needs to
            # wake CI on the existing PR.
            #
            # Idempotent: skips if HEAD is already a "Wake CI"
            # commit, so successive runs don't stack empty commits.
            - name: Wake CI for Release PR
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  DEPLOY_KEY: ${{ secrets.SMOOBLUE_RELEASE_DEPLOY_KEY }}
              run: |
                  if [[ -z "${DEPLOY_KEY:-}" ]]; then
                      echo "::warning::SMOOBLUE_RELEASE_DEPLOY_KEY not set — can't wake CI on Release PR"
                      exit 0
                  fi
                  PR=$(gh pr list --repo "$GITHUB_REPOSITORY" \
                      --head changeset-release/main \
                      --state open \
                      --json number --jq '.[0].number')
                  if [[ -z "$PR" || "$PR" == "null" ]]; then
                      echo "▸ no open Release PR — nothing to wake"
                      exit 0
                  fi
                  echo "▸ waking CI on Release PR #$PR"

                  mkdir -p ~/.ssh
                  printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/dk
                  chmod 600 ~/.ssh/dk
                  ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

                  git fetch origin changeset-release/main
                  git checkout changeset-release/main

                  if git log -1 --pretty=%s | grep -q "^Wake CI$"; then
                      echo "  (HEAD is already a Wake CI commit — skipping)"
                      exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git commit --allow-empty -m "Wake CI"

                  GIT_SSH_COMMAND="ssh -i ~/.ssh/dk -o IdentitiesOnly=yes" \
                      git push git@github.com:SmooAI/smooblue.git changeset-release/main
                  echo "✓ pushed empty wake commit — ci.yml's pull_request hook should fire now"

            # Block this job until the Release PR actually merges, then
            # tag the merge commit ourselves. Why inline instead of a
            # separate workflow listening on PR-merge: GitHub's
            # anti-loop guard (see the `on:` comment) suppresses every
            # event authored by GITHUB_TOKEN — push:main AND
            # pull_request_target:closed both — so a follow-up workflow
            # would never fire. The only way to reliably tag is to
            # stay in the same job that enabled auto-merge.
            #
            # Polls every 30s for up to 45 min. Real-world Release PRs
            # merge in 8-15 min (cargo test ubuntu + macos in parallel,
            # then GH squashes). The 45 min cap is the "CI failed and
            # the PR is stuck" timeout — at that point the job errors,
            # the Release PR stays open for manual triage, and the
            # next push to main re-runs this whole flow.
            #
            # Looks up the PR via gh (not the action output) so a
            # no-op changesets run (e.g. this workflow file was edited
            # but no changeset added) still polls + tags an
            # already-mergeable PR from a prior run.
            #
            # ci-tag-and-push.sh reads package.json's version, creates
            # vX.Y.Z, and pushes via SMOOBLUE_RELEASE_DEPLOY_KEY so
            # the tag push wakes release.yml (tag pushes are also
            # anti-loop-suppressed when from GITHUB_TOKEN).
            - name: Wait for Release PR to merge + tag
              if: steps.changesets.outputs.hasChangesets == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SMOOBLUE_RELEASE_DEPLOY_KEY: ${{ secrets.SMOOBLUE_RELEASE_DEPLOY_KEY }}
              run: |
                  PR=$(gh pr list --repo "$GITHUB_REPOSITORY" \
                      --head changeset-release/main \
                      --state all \
                      --json number,mergedAt --jq '.[0].number')
                  if [[ -z "$PR" || "$PR" == "null" ]]; then
                      echo "▸ no Release PR found — nothing to wait on"
                      exit 0
                  fi
                  echo "▸ polling Release PR #$PR for merge (up to 45 min)…"
                  DEADLINE=$(( $(date +%s) + 45*60 ))
                  MERGE_SHA=""
                  while [[ $(date +%s) -lt $DEADLINE ]]; do
                      DATA=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" \
                          --json mergedAt,mergeCommit,state --jq \
                          '"\(.state) \(.mergedAt // "") \(.mergeCommit.oid // "")"')
                      STATE=$(echo "$DATA" | cut -d' ' -f1)
                      MERGED_AT=$(echo "$DATA" | cut -d' ' -f2)
                      SHA=$(echo "$DATA" | cut -d' ' -f3)
                      if [[ "$STATE" == "MERGED" && -n "$SHA" ]]; then
                          MERGE_SHA="$SHA"
                          echo "✓ PR #$PR merged at $MERGED_AT (sha $SHA)"
                          break
                      fi
                      if [[ "$STATE" == "CLOSED" ]]; then
                          echo "::warning::PR #$PR closed without merging — nothing to tag"
                          exit 0
                      fi
                      sleep 30
                  done
                  if [[ -z "$MERGE_SHA" ]]; then
                      echo "::error::Timed out waiting for PR #$PR to merge after 45 min"
                      exit 1
                  fi

                  echo "▸ checking out merge commit $MERGE_SHA"
                  git fetch origin main
                  git checkout "$MERGE_SHA"

                  echo "▸ tagging + pushing via deploy key"
                  ./scripts/ci-tag-and-push.sh
