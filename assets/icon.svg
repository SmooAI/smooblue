<svg viewBox="0 0 135 135" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Smooblue brand mark — Borg-cybernetic Bluesky butterfly with
       a smoo monogram chip clipped onto the bottom-right corner.
       Hard geometric plating + glowing red sensor slit + matrix-grid
       wing inlay. Mechanical, not organic. -->
  <defs>
    <!-- Smoo orange/red gradient (chip + accents) -->
    <linearGradient id="smoo" gradientUnits="userSpaceOnUse" x1="112.93" x2="22.42" y1="113.22" y2="22.71">
      <stop offset=".3" stop-color="#f49f0a"/>
      <stop offset=".79" stop-color="#fb7a4d"/>
      <stop offset="1" stop-color="#ff6b6c"/>
    </linearGradient>
    <!-- Cold metal blue wing fill -->
    <linearGradient id="metalBlue" gradientUnits="userSpaceOnUse" x1="-20" x2="20" y1="-15" y2="15">
      <stop offset="0" stop-color="#02386b"/>
      <stop offset=".5" stop-color="#0560c4"/>
      <stop offset="1" stop-color="#1185fe"/>
    </linearGradient>
    <!-- Edge highlight stripe -->
    <linearGradient id="edgeGlow" gradientUnits="userSpaceOnUse" x1="0" x2="0" y1="-20" y2="20">
      <stop offset="0" stop-color="#5cb1ff" stop-opacity=".95"/>
      <stop offset="1" stop-color="#1185fe" stop-opacity=".2"/>
    </linearGradient>
    <!-- Red Borg sensor glow (radial) -->
    <radialGradient id="borgEye" cx="0" cy="0" r="6">
      <stop offset="0" stop-color="#ffe4e4" stop-opacity="1"/>
      <stop offset=".3" stop-color="#ff3333" stop-opacity="1"/>
      <stop offset="1" stop-color="#7a0000" stop-opacity=".0"/>
    </radialGradient>
    <!-- Wing-plate dark seam -->
    <linearGradient id="plateSeam" gradientUnits="userSpaceOnUse" x1="0" x2="0" y1="-12" y2="12">
      <stop offset="0" stop-color="#020618" stop-opacity=".0"/>
      <stop offset=".5" stop-color="#020618" stop-opacity=".55"/>
      <stop offset="1" stop-color="#020618" stop-opacity=".0"/>
    </linearGradient>
    <!-- Small matrix-grid pattern for wing inlay (used as a fill) -->
    <pattern id="circuit" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="3" fill="transparent"/>
      <path d="M0 0H3M0 0V3" stroke="#5cb1ff" stroke-width=".18" stroke-opacity=".55"/>
    </pattern>
  </defs>

  <!-- Outer mechanical ring — subtle, only on a few clock positions -->
  <g transform="translate(67.5 64)">
    <!-- Background ring sectors (faint) -->
    <circle r="58" fill="none" stroke="#0a2440" stroke-width="2.5" stroke-opacity=".55"
            stroke-dasharray="14 5 8 5 6 5 18 5"/>
    <!-- Inner sensor ring (brighter) -->
    <circle r="50" fill="none" stroke="#1185fe" stroke-width=".7" stroke-opacity=".75"
            stroke-dasharray="2 4"/>
  </g>

  <!-- BUTTERFLY — Borg edition.
       Coordinate system is centered at (67.5, 60). All inner art uses
       small numbers so the geometry stays readable. -->
  <g transform="translate(67.5 60) scale(3.0)">
    <!-- Antennae: hard metallic spikes with conductive tips -->
    <g stroke="#5cb1ff" stroke-linecap="square" stroke-width=".55">
      <path d="m-2-11L-9-19" fill="none"/>
      <path d="m2-11L9-19"   fill="none"/>
    </g>
    <!-- Antenna sensor balls -->
    <circle cx="-9" cy="-19" fill="#ff3333" r="1.1"/>
    <circle cx="9"  cy="-19" fill="#ff3333" r="1.1"/>

    <!-- Upper wings (left + right) -->
    <g stroke="#020618" stroke-linejoin="miter" stroke-width=".4">
      <!-- Left upper -->
      <path d="m-2-6c-6-9-17-8-16 1 1 5 10 6 16 3z" fill="url(#metalBlue)"/>
      <path d="m-2-6c-6-9-17-8-16 1 1 5 10 6 16 3z" fill="url(#circuit)"/>
      <!-- Right upper -->
      <path d="m2-6c6-9 17-8 16 1-1 5-10 6-16 3z" fill="url(#metalBlue)"/>
      <path d="m2-6c6-9 17-8 16 1-1 5-10 6-16 3z" fill="url(#circuit)"/>
    </g>
    <!-- Hard chevron plating on upper wings -->
    <g fill="none" stroke="#5cb1ff" stroke-width=".4" stroke-opacity=".9">
      <path d="m-15-3L-9-1.5L-3-3"/>
      <path d="m-15-1L-9.5 .5L-3-1"/>
      <path d="m15-3L9-1.5L3-3"/>
      <path d="m15-1L9.5 .5L3-1"/>
    </g>

    <!-- Lower wings -->
    <g stroke="#020618" stroke-width=".4">
      <path d="m-2 2c-5 7-14 10-13 3 1-4 8-5 13-3z" fill="url(#metalBlue)"/>
      <path d="m-2 2c-5 7-14 10-13 3 1-4 8-5 13-3z" fill="url(#circuit)"/>
      <path d="m2 2c5 7 14 10 13 3-1-4-8-5-13-3z"   fill="url(#metalBlue)"/>
      <path d="m2 2c5 7 14 10 13 3-1-4-8-5-13-3z"   fill="url(#circuit)"/>
    </g>
    <!-- Lower-wing accent chevrons -->
    <g fill="none" stroke="#5cb1ff" stroke-width=".35" stroke-opacity=".8">
      <path d="m-13 6L-8 4L-3 5"/>
      <path d="m13 6L8 4L3 5"/>
    </g>

    <!-- Central plated body — armored, segmented -->
    <ellipse rx="2.1" ry="9" fill="#02152e"/>
    <!-- Body segment lines -->
    <g stroke="#5cb1ff" stroke-width=".25" stroke-opacity=".85">
      <line x1="-1.6" x2="1.6" y1="-5" y2="-5"/>
      <line x1="-1.7" x2="1.7" y1="-2" y2="-2"/>
      <line x1="-1.7" x2="1.7" y1="1"  y2="1"/>
      <line x1="-1.6" x2="1.6" y1="4"  y2="4"/>
    </g>

    <!-- Head plate (armored, dark, with a single red Borg sensor slit) -->
    <circle cy="-9" r="4.2" fill="#020e1f" stroke="#1185fe" stroke-width=".4"/>
    <!-- Borg sensor: thin horizontal red glow + bright inner dot -->
    <g transform="translate(0 -8.7)">
      <ellipse rx="4" ry="2" fill="url(#borgEye)"/>
      <rect x="-3" y="-.55" width="6" height="1.1" fill="#ff1f1f"/>
      <rect x="-3" y="-.25" width="6" height=".5"  fill="#ffe0e0"/>
    </g>

    <!-- Glinting highlights on the outer wing edges -->
    <g fill="url(#edgeGlow)" opacity=".7">
      <ellipse cx="-15" cy="-6" rx="2.2" ry="1"/>
      <ellipse cx="15"  cy="-6" rx="2.2" ry="1"/>
    </g>
  </g>

  <!-- Smoo monogram chip — bottom-right brand stamp -->
  <g transform="translate(109 109)">
    <circle r="20" fill="#020618" opacity=".35"/>
    <circle r="18.5" fill="#fff"/>
    <g transform="translate(-17 -17) scale(0.252)">
      <path d="m45.63 15.38c-12.39 5.21-22.54 14.64-28.65 26.61-6.12 11.97-7.8 25.72-4.77 38.81 3.04 13.09 10.6 24.69 21.36 32.75s24.02 12.05 37.44 11.28 26.13-6.26 35.9-15.5c9.76-9.24 15.95-21.63 17.46-34.99s-1.74-26.82-9.19-38.01c-1.07-1.61-.64-3.78.97-4.85s3.78-.64 4.85.97c8.36 12.56 12.02 27.68 10.32 42.67-1.7 15-8.64 28.91-19.61 39.28-10.96 10.37-25.24 16.54-40.31 17.4-15.07.87-29.96-3.62-42.04-12.66-12.08-9.05-20.58-22.07-23.99-36.77s-1.51-30.14 5.35-43.58c6.87-13.44 18.26-24.02 32.17-29.87s29.44-6.6 43.85-2.11c1.85.57 2.88 2.54 2.3 4.38-.57 1.85-2.54 2.88-4.38 2.3-12.83-4-26.67-3.33-39.06 1.88zm63.1 4.79c0 2.07-1.68 3.75-3.75 3.75s-3.75-1.68-3.75-3.75 1.68-3.75 3.75-3.75 3.75 1.68 3.75 3.75zm-46.75 40.17c0 1.91 2.39 2.56 7.69 3.88 3.89.97 6.6 2.18 8.15 3.63 1.53 1.45 2.29 3.53 2.29 6.25 0 3.57-1.03 6.26-3.11 8.08-2.07 1.82-5.09 2.73-9.09 2.73h-9.6c-1.97 0-3.57-1.6-3.59-3.57-.01-1.99 1.6-3.61 3.59-3.61h9.41c3.15-.12 4.79-.95 4.91-2.47 0-1.3-1.03-2.21-3.07-2.73-6.91-1.72-11.11-3.44-12.6-5.15-1.48-1.71-2.23-3.77-2.23-6.19 0-6.59 3.2-9.85 9.59-9.8h10.77c1.99 0 3.6 1.61 3.6 3.59s-1.61 3.59-3.6 3.59h-9.69c-1.83 0-3.43.06-3.43 1.77z" fill="url(#smoo)" fill-rule="evenodd"/>
    </g>
  </g>
</svg>
