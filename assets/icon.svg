<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
    <defs>
        <linearGradient id="smoo-gradient" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f49f0a" />
            <stop offset="55%" stop-color="#fb7a4d" />
            <stop offset="100%" stop-color="#ff6b6c" />
        </linearGradient>
        <radialGradient id="smoo-glow" cx="512" cy="512" r="600" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ff8a4b" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#5b1a8a" stop-opacity="0" />
        </radialGradient>
        <filter id="bird-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="14" />
            <feOffset dx="0" dy="10" result="off" />
            <feComponentTransfer><feFuncA type="linear" slope="0.55" /></feComponentTransfer>
            <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>

