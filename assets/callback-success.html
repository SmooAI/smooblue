<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Smooblue — signed in</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            :root {
                --bg: oklch(0.145 0.014 265);
                --card: oklch(0.205 0.015 265);
                --border: oklch(0.3 0.008 260);
                --fg: oklch(0.984 0.003 247.9);
                --muted: oklch(0.715 0 89.9);
                --gradient: linear-gradient(135deg, #f49f0a 0%, #ff6b6c 100%);
            }
            * { box-sizing: border-box; margin: 0; padding: 0; }
            html, body {
                height: 100%;
                background: var(--bg);
                color: var(--fg);
                font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
                -webkit-font-smoothing: antialiased;
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }
            .card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 18px;
                padding: 40px 44px 36px;
                text-align: center;
                max-width: 420px;
                box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
                animation: card-in 280ms cubic-bezier(.2,.7,.3,1) both;
            }
            @keyframes card-in {
                from { opacity: 0; transform: translateY(10px); }
                to   { opacity: 1; transform: translateY(0); }
            }
            .logo {
                width: 96px;
                height: 96px;
                margin: 0 auto 20px;
                border-radius: 22px;
                overflow: hidden;
                box-shadow: 0 12px 32px rgba(244, 159, 10, 0.35);
            }
            .logo svg { width: 100%; height: 100%; display: block; }
            h1 {
                font-size: 26px;
                font-weight: 700;
                background: var(--gradient);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                margin-bottom: 8px;
            }
            p {
                color: var(--muted);
                font-size: 14px;
                line-height: 1.5;
            }
            .pulse {
                margin: 24px auto 0;
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: oklch(0.657 0.112 194.8);
                animation: smoo-pulse 1.6s ease-in-out infinite;
            }
            @keyframes smoo-pulse {
                0%, 100% { box-shadow: 0 0 0 0 rgba(0, 166, 166, 0.55); }
                50%      { box-shadow: 0 0 0 10px rgba(0, 166, 166, 0); }
            }
        </style>
    </head>
